<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aura Player</title>
  <link rel="stylesheet" href="style1.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="player-wrapper">

    <!-- Playlist Panel -->
    <aside class="playlist-panel" id="playlistPanel">
      <div class="panel-header">
        <span class="panel-title">Playlist</span>
        <button class="panel-close" id="closePlaylist" aria-label="Close playlist">✕</button>
      </div>
      <ul class="playlist" id="playlistEl">
        <!-- Populated by JS -->
      </ul>
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept="audio/*" multiple hidden />
        <button class="upload-btn" id="uploadBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Upload Songs
        </button>
        <p class="upload-hint">MP3, WAV, OGG supported</p>
      </div>
    </aside>

    <!-- Main Player Card -->
    <div class="player-card">

      <!-- Top bar -->
      <div class="topbar">
        <button class="icon-btn" id="togglePlaylist" title="Playlist">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        </button>
        <span class="brand">AURA</span>
        <button class="icon-btn" id="toggleShuffle" title="Shuffle">
          <svg id="shuffleIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
        </button>
      </div>

      <!-- Album Art -->
      <div class="art-wrapper" id="artWrapper">
        <div class="art-ring"></div>
        <div class="art-inner">
          <div class="art-img" id="artImg">
            <svg class="music-note-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
              <text x="50%" y="58%" dominant-baseline="middle" text-anchor="middle" font-size="52" opacity="0.7">🎵</text>
            </svg>
          </div>
        </div>
        <div class="art-pulse"></div>
      </div>

      <!-- Song Info -->
      <div class="song-info">
        <div class="song-title-wrapper">
          <p class="song-title" id="songTitle">No Track Loaded</p>
        </div>
        <p class="song-artist" id="songArtist">— Upload a song to begin —</p>
        <p class="song-duration-label" id="songAlbum"></p>
      </div>

      <!-- Waveform / Progress -->
      <div class="progress-section">
        <div class="waveform-bar" id="waveformBar">
          <canvas id="waveCanvas" height="48"></canvas>
          <input type="range" class="progress-slider" id="progressSlider" min="0" max="100" value="0" step="0.1" />
        </div>
        <div class="time-row">
          <span id="currentTime">0:00</span>
          <span id="totalTime">0:00</span>
        </div>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button class="ctrl-btn secondary" id="prevBtn" title="Previous">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
        </button>
        <button class="ctrl-btn play-pause" id="playPauseBtn" title="Play/Pause">
          <svg class="icon-play" id="iconPlay" viewBox="0 0 24 24" fill="currentColor" width="28" height="28"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          <svg class="icon-pause hidden" id="iconPause" viewBox="0 0 24 24" fill="currentColor" width="28" height="28"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        </button>
        <button class="ctrl-btn secondary" id="nextBtn" title="Next">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
        </button>
      </div>

      <!-- Volume + Repeat -->
      <div class="bottom-row">
        <button class="icon-btn" id="toggleRepeat" title="Repeat">
          <svg id="repeatIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        </button>
        <div class="volume-group">
          <button class="icon-btn" id="muteBtn" title="Mute">
            <svg id="volIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
          </button>
          <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80" />
        </div>
        <div class="autoplay-toggle">
          <label class="toggle-label" title="Autoplay">
            <input type="checkbox" id="autoplayCheck" checked />
            <span class="toggle-track"></span>
          </label>
          <span class="toggle-text">Auto</span>
        </div>
      </div>

    </div>
  </div>

  <audio id="audioEl"></audio>
  <script src="script.js"></script>
</body>
</html>
